<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Все работы — Ailana Bovaeva</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .back-link {
            display: inline-block;
            margin: 20px 0;
            color: #222;
            text-decoration: none;
            font-weight: bold;
        }
        .back-link:hover {
            color: #a56b7a;
        }
        .all-works {
            padding: 120px 0 80px;
        }
        .admin-panel {
            background: white;
            padding: 30px;
            border-radius: 32px;
            margin: 40px 0;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }
        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 20px;
        }
        .form-row input, .form-row textarea {
            flex: 1;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 24px;
            font-family: inherit;
        }
        .admin-buttons button {
            background: #222;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            margin-right: 12px;
            cursor: pointer;
            transition: 0.2s;
        }
        .admin-buttons button:hover {
            background: #a56b7a;
        }
        .works-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 40px;
            margin-top: 50px;
        }
        .work-card {
            background: white;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 8px 18px rgba(0,0,0,0.1);
            transition: 0.2s;
        }
        .work-card img {
            width: 100%;
            height: 240px;
            object-fit: cover;
        }
        .work-card-info {
            padding: 16px;
        }
        .work-card-info h3 {
            font-size: 22px;
        }
        .work-card-info p {
            color: #555;
            margin: 8px 0;
        }
        .card-actions {
            display: flex;
            gap: 12px;
            margin-top: 12px;
        }
        .card-actions button {
            background: #ddd;
            border: none;
            padding: 6px 12px;
            border-radius: 30px;
            cursor: pointer;
        }
        .edit-btn { background: #f4bfd0; }
        .delete-btn { background: #ccc; }
    </style>
</head>
<body>

<header>
    <div class="container">
        <nav>
            <div class="logo">✦</div>
            <div class="menu">
                <a href="index.html#about">Обо мне</a>
                <a href="index.html#works">Лучшие работы</a>
                <a href="all-works.html">Все работы</a>
                <a href="index.html#contacts">Контакты</a>
            </div>
        </nav>
    </div>
</header>

<section class="all-works">
    <div class="container">
        <a href="index.html" class="back-link">← На главную</a>
        <h2>📁 Все работы</h2>
        <p style="margin-bottom:20px;">Управление проектами: добавление, редактирование, удаление</p>
        
        <div class="admin-panel">
            <h3 style="margin-bottom:16px;">➕ Добавить новую работу</h3>
            <div class="form-row">
                <input type="text" id="workTitle" placeholder="Название работы">
                <input type="text" id="workCategory" placeholder="Категория">
            </div>
            <div class="form-row">
                <input type="text" id="workImageUrl" placeholder="URL изображения">
                <input type="text" id="workYear" placeholder="Год / курс">
            </div>
            <div class="admin-buttons">
                <button id="addWorkBtn">➕ Добавить работу</button>
                <button id="resetFormBtn" style="background:#aaa;">Очистить</button>
            </div>
            <div id="editHint" style="margin-top:8px; font-size:14px; color:#a56b7a;"></div>
        </div>
        
        <div id="worksGrid" class="works-grid"></div>
    </div>
</section>

<script src="works-manager.js"></script>
</body>
</html>
